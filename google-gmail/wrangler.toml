name = "google-gmail-mcp"
main = "server/main.ts"
compatibility_date = "2025-06-17"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "google-gmail-mcp.decocms.com", custom_domain = true },
]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# Email → connection mapping (and `triggers:*` subscription state under
# the same namespace). Workers isolates are ephemeral, so we can't keep
# this in memory between webhook deliveries / cold starts.
#
# Create with: bunx wrangler kv namespace create EMAIL_MAP
# Then paste the returned id below.
[[kv_namespaces]]
binding = "EMAIL_MAP"
id = "e40b3fbbff0b45b2adcc3d868c18f760"
