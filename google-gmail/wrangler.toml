#:schema node_modules/wrangler/config-schema.json
name = "google-gmail"
main = "server/main.ts"
compatibility_date = "2025-06-17"
compatibility_flags = [ "nodejs_compat" ]

[[kv_namespaces]]
binding = "EMAIL_MAP"
id = "PLACEHOLDER_KV_NAMESPACE_ID"

[vars]
GMAIL_PUBSUB_TOPIC = ""

# Set via `wrangler secret put GMAIL_WEBHOOK_SECRET`
# Then configure Pub/Sub push subscription URL as:
#   https://<worker>/webhooks/gmail?token=<secret>
